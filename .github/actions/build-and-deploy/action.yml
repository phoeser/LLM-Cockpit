name: Build & Deploy Cockpit
description: AES-256-GCM Encrypt + robuster git push
inputs:
  dashboard-password:
    description: Dashboard-Passwort
    required: true
  commit-message:
    description: Commit-Message für die Auto-Commit
    required: false
    default: "chore: dashboard update"

runs:
  using: composite
  steps:
    - name: Verschluessele Dashboard
      shell: bash
      env:
        DASHBOARD_PASSWORD: ${{ inputs.dashboard-password }}
      run: |
        set -e
        echo "=== Dashboard verschluesseln (AES-256-GCM) ==="
        ls -la dashboard_template.html
        python scripts/encrypt_dashboard.py
        echo "=== Fertig ==="
        ls -la index.html data.enc

    - name: Commit und Push (mit pull --rebase + retry)
      shell: bash
      env:
        COMMIT_MSG: ${{ inputs.commit-message }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html data.enc
        git add -u dashboard_template.html 2>/dev/null || true
        for f in berater_data.json domain_footprint_data.json snapshot.json; do
          if [ -f "$f" ]; then git add "$f"; fi
        done
        if [ -d data ]; then git add data/ 2>/dev/null || true; fi
        if git diff --staged --quiet; then
          echo "Keine Aenderungen am Dashboard."
          exit 0
        fi
        git commit -m "$COMMIT_MSG"
        for i in 1 2 3; do
          git pull --rebase -X theirs origin main || git rebase --abort 2>/dev/null || true
          if git push; then
            echo "Push OK auf Versuch $i"
            exit 0
          fi
          echo "Push fail, retry $i"
          sleep 5
        done
        echo "FEHLER: Push nach 3 Versuchen gescheitert"
        exit 1
