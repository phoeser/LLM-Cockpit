name: Build & Deploy Cockpit
description: StatiCrypt-Encrypt + inject_password_fix + robuster git push
inputs:
  dashboard-password:
    description: StatiCrypt-Passwort
    required: true
  commit-message:
    description: Commit-Message für die Auto-Commit
    required: false
    default: "chore: dashboard update"

runs:
  using: composite
  steps:
    - name: Verschluessele Dashboard mit StatiCrypt
      shell: bash
      env:
        DASHBOARD_PASSWORD: ${{ inputs.dashboard-password }}
      run: |
        set -e
        echo "=== Vor StatiCrypt ==="
        cp dashboard_template.html dashboard_unencrypted.html
        ls -la dashboard_unencrypted.html
        echo "=== StatiCrypt-Aufruf (Passwort via stdin, kein CLI-Leak) ==="
        echo "$DASHBOARD_PASSWORD" | staticrypt dashboard_unencrypted.html \
          --password-file /dev/stdin \
          --short \
          --remember 30 \
          --template-title "ERGO LLM-Cockpit" \
          --template-instructions "Bitte Passwort eingeben." \
          --template-button "Anmelden" \
          --template-error "Falsches Passwort." \
          -d ./out
        if [ -f ./out/dashboard_unencrypted.html ]; then
          mv ./out/dashboard_unencrypted.html index.html
        elif [ -f ./encrypted/dashboard_unencrypted.html ]; then
          mv ./encrypted/dashboard_unencrypted.html index.html
        elif [ -f dashboard_unencrypted_encrypted.html ]; then
          mv dashboard_unencrypted_encrypted.html index.html
        else
          echo "FEHLER: kein StatiCrypt-Output"
          exit 1
        fi
        rm -rf ./out ./encrypted dashboard_unencrypted.html
        echo "=== Patche index.html ==="
        python scripts/inject_password_fix.py
        echo "=== Final ==="
        ls -la index.html

    - name: Commit und Push (mit pull --rebase + retry)
      shell: bash
      env:
        COMMIT_MSG: ${{ inputs.commit-message }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Workflow-Outputs adden (Update-Scripts patchen Template + JSONs in-place)
        git add index.html
        git add -u dashboard_template.html 2>/dev/null || true
        for f in berater_data.json domain_footprint_data.json snapshot.json; do
          if [ -f "$f" ]; then git add "$f"; fi
        done
        if [ -d data ]; then git add data/ 2>/dev/null || true; fi
        if git diff --staged --quiet; then
          echo "Keine Aenderungen am Dashboard."
          exit 0
        f