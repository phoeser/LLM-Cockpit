name: Berater Update (manuell)

on:
  workflow_dispatch:

concurrency:
  group: berater-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LLM-Cockpit-Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Aktualisiere Berater-Daten (ERGO Vermittler-API)
        run: python scripts/update_berater.py

      - name: Crawl Berater-Sitemap (Unterseiten-Erkennung)
        run: python scripts/crawl_berater_sitemap.py
        continue-on-error: true

      - name: Daten committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add berater_data.json 2>/dev/null || true
          git add data/berater_sitemap_data.json 2>/dev/null || true
          git add sitemaps/berater_sitemap.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: berater + sitemap update"
          git push origin main

      - name: Build und Deploy
        uses: ./.github/actions/build-and-deploy
        with:
          dashboard-password: ${{ secrets.DASHBOARD_PASSWORD }}
          commit-message: "chore: berater data update"
