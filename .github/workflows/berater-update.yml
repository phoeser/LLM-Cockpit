name: Berater Update (manuell)

on:
  workflow_dispatch:

concurrency:
  group: berater-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LLM-Cockpit-Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install StatiCrypt
        run: npm install -g staticrypt@^3.5.4

      - name: Aktualisiere Berater-Daten (ERGO Vermittler-API)
        run: python scripts/update_berater.py

      - name: Build und Deploy
        uses: ./.github/actions/build-and-deploy
        with:
          dashboard-password: ${{ secrets.DASHBOARD_PASSWORD }}
          commit-message: "chore: berater data update"
