name: Nightly Dashboard Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LLM-Cockpit-Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install StatiCrypt
        run: npm install -g staticrypt@^3.5.4

      - name: Lade aktuellsten GEO-Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GEO_REPRO_TOKEN }}
          GEO_REPO: phoeser/geo-visibility-tool
        run: python scripts/update_snapshot.py

      - name: Aktualisiere Sentiment-Daten (Trustpilot Live - Phase A)
        run: python scripts/update_sentiment.py
        continue-on-error: true

      - name: Install Playwright fuer Sentiment Fallback
        run: |
          pip install playwright
          playwright install chromium --with-deps
        continue-on-error: true

      - name: Aktualisiere Sentiment via Browser (Phase B - Fallback)
        run: python scripts/update_sentiment_browser.py
        continue-on-error: true

      - name: Aktualisiere Domain-Footprint (Subdomain-Crawl)
        run: python scripts/update_domain_footprint.py
        continue-on-error: true

      - name: Build und Deploy
        uses: ./.github/actions/build-and-deploy
        with:
          dashboard-password: ${{ secrets.DASHBOARD_PASSWORD }}
          commit-message: "chore: nightly dashboard update"
