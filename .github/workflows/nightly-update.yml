name: Nightly Dashboard Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LLM-Cockpit-Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install StatiCrypt
        run: npm install -g staticrypt@^3.5.4

      - name: Lade aktuellsten GEO-Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GEO_REPRO_TOKEN }}
          GEO_REPO: phoeser/geo-visibility-tool
        run: python scripts/update_snapshot.py

      - name: Verschluessele Dashboard mit StatiCrypt
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          set -e
          echo "=== Vor StatiCrypt ==="
          ls -la dashboard_unencrypted.html
          echo "=== StatiCrypt-Aufruf ==="
          staticrypt dashboard_unencrypted.html             --password "$DASHBOARD_PASSWORD"             --short             --remember 30             --template-title "ERGO LLM-Cockpit"             --template-instructions "Bitte Passwort eingeben."             --template-button "Anmelden"             --template-error "Falsches Passwort."             --template-color-primary "#DC0028"             --template-color-secondary "#282D37"             --short             -d ./out
          echo "=== Output-Verzeichnis ==="
          ls -la ./out/ || true
          ls -la ./encrypted/ || true
          # StatiCrypt 3.x schreibt standardmaessig in ./encrypted/<input>.html oder ./out/<input>.html
          if [ -f ./out/dashboard_unencrypted.html ]; then
            mv ./out/dashboard_unencrypted.html index.html
            echo "Output gefunden in ./out/"
          elif [ -f ./encrypted/dashboard_unencrypted.html ]; then
            mv ./encrypted/dashboard_unencrypted.html index.html
            echo "Output gefunden in ./encrypted/"
          elif [ -f dashboard_unencrypted_encrypted.html ]; then
            mv dashboard_unencrypted_encrypted.html index.html
            echo "Output gefunden als _encrypted.html"
          else
            echo "FEHLER: kein StatiCrypt-Output gefunden"
            ls -la
            exit 1
          fi
          rm -rf ./out ./encrypted dashboard_unencrypted.html
          echo "=== Final ==="
          ls -la index.html

      - name: Commit und Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Keine Aenderungen am Dashboard."
          else
            git commit -m "chore: nightly dashboard update"
            git push
          fi
