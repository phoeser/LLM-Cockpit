name: Nightly Dashboard Update

on:
  schedule:
    # 05:00 UTC (07:00 MESZ) - VOR dem GEO-Workflow (~06:00 UTC),
    # aber nach Mitternacht, sodass Presse/Sentiment-Events taggenau sind.
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LLM-Cockpit-Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright fuer Trustpilot-Fallback
        run: |
          pip install playwright
          playwright install chromium --with-deps
        continue-on-error: true

      - name: Lade aktuellsten GEO-Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GEO_REPRO_TOKEN }}
          GEO_REPO: phoeser/geo-visibility-tool
        run: python scripts/update_snapshot.py

      - name: Aktualisiere Sentiment-Daten (4 Quellen)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python scripts/update_sentiment.py

      - name: Aktualisiere Presse-Daten (Google News RSS)
        run: python scripts/update_press.py
        continue-on-error: true

      - name: Aktualisiere Domain-Footprint (Subdomain-Crawl)
        run: python scripts/update_domain_footprint.py
        continue-on-error: true

      - name: Daten-Dateien zurueck in main committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Review-History + Events-Timeline committen
          git add data/review_history.json 2>/dev/null || true
          git add shared/events.jsonl 2>/dev/null || true
          git add data/geo_page_events.last_run_id.txt 2>/dev/null || true
          git add data/*.previous.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: update review_history + events + page tracking"
          git push origin main

      - name: Build und Deploy
        uses: ./.github/actions/build-and-deploy
        with:
          dashboard-password: ${{ secrets.DASHBOARD_PASSWORD }}
          commit-message: "chore: nightly dashboard update"
